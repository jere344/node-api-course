services:
  - type: web
    name: evaluation-day3-api
    env: node
    plan: free
    rootDir: evaluations/day3
    buildCommand: npm ci
    startCommand: npm run start:render
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/var/data/dev.db
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
